name: Java CI/CD

# лҸҷмһ‘ мЎ°кұҙ м„Өм • : Pull_requestк°Җ closed лҗҗмқ„кІҪмҡ°
on:
  pull_request:
    types: [ closed ] #pull_request closed лҗҗмқ„ кІҪмҡ°
  workflow_dispatch: # мҲҳлҸҷмӢӨн–үлҸ„ к°ҖлҠҘн•ҳлҸ„лЎқ


jobs:
  # Spring Boot м• н”ҢлҰ¬мјҖмқҙм…ҳмқ„ л№Ңл“ңн•ҳм—¬ лҸ„м»Өн—ҲлёҢм—җ н‘ёмӢңн•ҳлҠ” кіјм •
  build-docker-image:
    runs-on: ubuntu-latest
    #л§Ңм•Ҫ лЁём§Җк°Җ лҗ¬мқ„ кІҪмҡ°, лҳҗ base refк°Җ mainмқјкІҪмҡ° мӢӨн–ү
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      # 1. Java 17 м„ёнҢ…
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      # 2. gradelwм—җ к¶Ңн•ң л¶Җм—¬
      - name: Grant execute permission for gradelw
        run: chmod +x ./gradlew
        shell: bash

      # 3. Spring Boot м• н”ҢлҰ¬мјҖмқҙм…ҳ л№Ңл“ң
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        shell: bash

      # 4. Docker мқҙлҜём§Җ л№Ңл“ң
      - name: docker image build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bill-chat .

      # 5. DockerHub лЎңк·ёмқё
      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 6. Docker Hub мқҙлҜём§Җ л№Ңл“ң л°Ҹ н‘ёмӢң

      - name: docker Hub push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/bill-chat

      #7. EC2 л°°нҸ¬
      - name: Docker image pull & Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY}}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bill-chat:latest
            if [ $(docker ps -a -q -f name=bill-chat) ]; then
              sudo docker stop bill-chat
              sudo docker rm bill-chat
            fi
            
            sudo docker tag jainefer/bill-chat:latest bill-chat
            sudo docker run --name bill-chat -d -p 80:8080 \
              -e SPRING_RABBITMQ_HOST=${{ secrets.SPRING_RABBITMQ_HOST }} \
              -e SPRING_RABBITMQ_PORT=${{ secrets.SPRING_RABBITMQ_PORT }} \
              -e SPRING_RABBITMQ_USERNAME=${{ secrets.SPRING_RABBITMQ_USERNAME }} \
              -e SPRING_RABBITMQ_PASSWORD=${{ secrets.SPRING_RABBITMQ_PASSWORD }} \
              -e SPRING_DATA_MONGODB_URI=${{ secrets.SPRING_DATA_MONGODB_URI }} \
              -e SPRING_DATA_MONGODB_DATABASE=${{ secrets.SPRING_DATA_MONGODB_DATABASE }} \
              -e SPRING_MAIN_WEB_APPLICATION_TYPE=${{secrets.SPRING_MAIN_WEB_APPLICATION_TYPE }} \
              -e SPRINGDOC_PACKAGES_TO_SCAN=${{ secrets.SPRINGDOC_PACKAGES_TO_SCAN }} \
              -e SPRINGDOC_SWAGGER_UI_PATH=${{ secrets.SPRINGDOC_SWAGGER_UI_PATH }} \
              -e SPRINGDOC_SWAGGER_UI_DISABLE_SWAGGER_DEFAULT_URL=${{ secrets.SPRINGDOC_SWAGGER_UI_DISABLE_SWAGGER_DEFAULT_URL }} \
              -e SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER=${{ secrets.SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER }} \
              -e SPRINGDOC_API_DOCS_PATH=${{ secrets.SPRINGDOC_API_DOCS_PATH }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e API_SERVER_URL=${{ secrets.API_SERVER_URL }} \
              -e INTERNAL_CHAT_SECRET=${{ secrets.INTERNAL_CHAT_SECRET }} \
              -e INTERNAL_API_SECRET=${{ secrets.INTERNAL_API_SECRET }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/bill-chat:latest
            sudo docker rm $(sudo docker ps --filter 'status=exited' -a -q)
            sudo docker image prune -a -f